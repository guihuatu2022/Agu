{% extends "base.html" %}
{% block title %}历史归档 · 股票趋势分析{% endblock %}

{% block content %}
<div class="row g-3">
    <div class="col-12 col-lg-4">
        <div class="card">
            <div class="card-header"><i class="bi bi-calendar3"></i> 选择日期</div>
            <div class="card-body">
                <input type="date" class="form-control mb-3" id="archiveDate">
                <div class="text-muted small">点击日期查看当天的完整分析报告</div>
            </div>
        </div>
    </div>
    <div class="col-12 col-lg-8">
        <div class="card">
            <div class="card-header"><i class="bi bi-file-earmark-text"></i> 报告内容</div>
            <div class="card-body">
                <div class="text-center text-muted py-5">
                    <i class="bi bi-folder2-open" style="font-size: 3rem;"></i>
                    <div class="mt-3">暂无归档</div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
