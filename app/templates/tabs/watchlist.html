{% extends "base.html" %}
{% block title %}自选股 · 股票趋势分析{% endblock %}

{% block content %}
<div class="row g-3 mb-3">
    <div class="col-6 col-md-3">
        <div class="card text-center"><div class="card-body">
            <div class="text-muted small">自选总数</div>
            <div class="h3 mb-0">--</div>
        </div></div>
    </div>
    <div class="col-6 col-md-3">
        <div class="card text-center"><div class="card-body">
            <div class="text-muted small">A级机会</div>
            <div class="h3 mb-0 text-success">--</div>
        </div></div>
    </div>
    <div class="col-6 col-md-3">
        <div class="card text-center"><div class="card-body">
            <div class="text-muted small">持仓中</div>
            <div class="h3 mb-0 text-info">--</div>
        </div></div>
    </div>
    <div class="col-6 col-md-3">
        <div class="card text-center"><div class="card-body">
            <div class="text-muted small">平均评分</div>
            <div class="h3 mb-0">--</div>
        </div></div>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <i class="bi bi-star-fill text-warning"></i> 我的自选股
    </div>
    <div class="card-body">
        <div class="text-center text-muted py-5">
            <i class="bi bi-star" style="font-size: 3rem;"></i>
            <div class="mt-3">尚未添加自选股</div>
            <div class="small mt-2">从扫描结果中加入，或在设置中导入</div>
        </div>
    </div>
</div>
