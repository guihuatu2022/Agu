{% extends "base.html" %}
{% block title %}总览 · 股票趋势分析{% endblock %}

{% block content %}
<div class="row g-3">
    <!-- 大盘体温 -->
    <div class="col-12 col-lg-6">
        <div class="card h-100">
            <div class="card-header">
                <i class="bi bi-thermometer-half"></i> 今日大盘体温
            </div>
            <div class="card-body">
                <div class="text-muted small mb-3">数据加载中...</div>
                <div class="row text-center">
                    <div class="col">
                        <div class="text-muted small">阶段</div>
                        <div class="h4 text-warning">--</div>
                    </div>
                    <div class="col">
                        <div class="text-muted small">建议仓位</div>
                        <div class="h4">--</div>
                    </div>
                    <div class="col">
                        <div class="text-muted small">市场风格</div>
                        <div class="h4 text-info">--</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 机会等级分布 -->
    <div class="col-12 col-lg-6">
        <div class="card h-100">
            <div class="card-header">
                <i class="bi bi-bullseye"></i> 今日机会等级分布
            </div>
            <div class="card-body">
                <div class="row text-center g-3">
                    <div class="col-4">
                        <div class="p-3 rounded opp-a">
                            <div class="h2 mb-0">--</div>
                            <small>A级机会</small>
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="p-3 rounded opp-b">
                            <div class="h2 mb-0">--</div>
                            <small>B级机会</small>
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="p-3 rounded opp-c">
                            <div class="h2 mb-0">--</div>
                            <small>C级机会</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 主线板块TOP3 -->
    <div class="col-12 col-lg-6">
        <div class="card h-100">
            <div class="card-header">
                <i class="bi bi-fire"></i> 主线板块 TOP3
            </div>
            <div class="card-body">
                <div class="text-muted small">数据未加载，请先完成数据初始化</div>
            </div>
        </div>
    </div>

    <!-- 自选股快速查看 -->
    <div class="col-12 col-lg-6">
        <div class="card h-100">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span><i class="bi bi-star-fill text-warning"></i> 自选股 (评分前5)</span>
                <a href="/watchlist" class="text-decoration-none small">查看全部 →</a>
            </div>
            <div class="card-body">
                <div class="text-muted small">尚未添加自选股</div>
            </div>
        </div>
    </div>

    <!-- 系统状态 -->
    <div class="col-12">
        <div class="card">
            <div class="card-header">
                <i class="bi bi-gear"></i> 系统状态
            </div>
            <div class="card-body">
                <div class="row g-3 text-center">
                    <div class="col-6 col-md-3">
                        <div class="text-muted small">最后更新时间</div>
                        <div class="text-mono">--</div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="text-muted small">数据库股票数</div>
                        <div class="text-mono">--</div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="text-muted small">下次自动更新</div>
                        <div class="text-mono">17:30</div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="text-muted small">今日API调用</div>
                        <div class="text-mono">--</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
