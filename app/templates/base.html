<!DOCTYPE html>
<html lang="zh-CN" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}股票趋势分析系统{% endblock %}</title>

    <!-- Bootstrap 5 (Dark Theme) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- 自定义样式 -->
    <link href="/static/css/theme-dark.css" rel="stylesheet">

    {% block extra_head %}{% endblock %}
</head>
<body>
    <!-- 顶部导航 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="/">
                <span class="text-warning">📈</span> 趋势分析
                <small class="text-muted ms-2">v{{ version }}</small>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#mainNav" aria-controls="mainNav"
                    aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav me-auto">
                    {% for tab in tabs %}
                    <li class="nav-item">
                        <a class="nav-link {% if active_tab == tab.id %}active fw-bold text-warning{% endif %}"
                           href="{{ tab.url }}">
                            <span class="me-1">{{ tab.icon }}</span>{{ tab.name }}
                        </a>
                    </li>
                    {% endfor %}
                </ul>

                <!-- 右侧状态栏 -->
                <div class="d-flex align-items-center gap-3">
                    <span class="badge text-bg-secondary" id="dbStatus" title="数据库连接状态">
                        <i class="bi bi-database"></i> 检查中...
                    </span>
                    <span class="badge text-bg-info" id="dataDate">--</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="container-fluid py-3">
        {% block content %}{% endblock %}
    </main>

    <!-- 底部 -->
    <footer class="text-center text-muted py-3 mt-5 small border-top border-secondary">
        <div>
            股票趋势分析系统 v{{ version }} ·
            <a href="/api/health" class="text-muted">系统健康</a> ·
            数据来源：Tushare Pro
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- 通用JS -->
    <script src="/static/js/app.js"></script>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
